id: jigeum-queue-list
name: "Jigeum Queue List"
description: "Verify Jigeum can list the task queue"

agent:
  type: command
  command: "cd /Users/yongrean/Downloads/nightbot && npx tsx src/cli.ts queue"

steps:
  - action: check_output
    expect: "queue"

evaluate:
  method: rules
  passThreshold: 50
  rules:
    - type: exit_code
      target: exit
      value: "0"
      weight: 2
    - type: regex
      target: stdout
      value: "(pending|running|done|No tasks|Queue)"
      weight: 1
